<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>MadTracker</title>
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>MadTracker</h1>
    <button id="btn-add" onclick="openModal()">+ Adicionar</button>
  </header>

  <main id="asset-list">
    <div class="loading">Carregando...</div>
  </main>

  <div class="refresh-bar">
    <span id="last-update">—</span>
    <button onclick="loadAssets()">↻ Atualizar</button>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <h2>Adicionar Ativo</h2>
      <input id="search-input" type="text" placeholder="Buscar: bitcoin, ethereum..." autocomplete="off" oninput="searchCoin(this.value)" />
      <ul id="search-results"></ul>
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
