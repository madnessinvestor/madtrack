<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>MadTracker</title>
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>MadTracker</h1>
    <div class="header-actions">
      <button id="btn-lang" onclick="toggleLang()" title="Language">PT</button>
      <button id="btn-theme" onclick="toggleTheme()" title="Tema"></button>
      <button id="btn-currency" onclick="toggleCurrency()" title="Moeda">$</button>
      <button id="btn-alerts" class="btn-bell" onclick="openAlertsModal()" title="Alertas">
        🔔<span id="alert-badge" class="alert-badge hidden">0</span>
      </button>
      <button id="btn-add-tracker" class="btn-primary" onclick="openModal()">
        <span class="btn-icon">+</span><span data-i18n="btn_add">Adicionar</span>
      </button>
      <button id="btn-add-trade" class="btn-primary hidden" onclick="openTradeModal()">
        <span class="btn-icon">+</span><span data-i18n="btn_trade">Trade</span>
      </button>
    </div>
  </header>

  <!-- Tab bar -->
  <nav class="tab-bar">
    <button class="tab-btn active" id="tab-tracker" onclick="switchTab('tracker')">
      📊 <span data-i18n="tab_tracker">Tracker</span>
    </button>
    <button class="tab-btn" id="tab-trade" onclick="switchTab('trade')">
      💼 <span data-i18n="tab_trade">Trade</span>
    </button>
  </nav>

  <!-- Tracker section -->
  <section id="section-tracker">
    <main id="asset-list">
      <div class="loading" data-i18n="loading">Carregando...</div>
    </main>
  </section>

  <!-- Trade section -->
  <section id="section-trade" class="hidden">
    <div id="portfolio-summary" class="portfolio-summary hidden">
      <div class="psum-item">
        <span class="psum-label" data-i18n="invested">INVESTIDO</span>
        <span class="psum-val" id="psum-invested">—</span>
      </div>
      <div class="psum-item">
        <span class="psum-label" data-i18n="cur_value">VALOR ATUAL</span>
        <span class="psum-val" id="psum-value">—</span>
      </div>
      <div class="psum-item">
        <span class="psum-label" data-i18n="pnl">P&L</span>
        <span class="psum-val" id="psum-pnl">—</span>
      </div>
    </div>
    <main id="portfolio-list">
      <div class="loading" data-i18n="loading">Carregando...</div>
    </main>
  </section>

  <!-- Single refresh bar -->
  <div class="refresh-bar">
    <span id="last-update">—</span>
    <button id="btn-refresh" onclick="refreshCurrent()">↻ <span data-i18n="btn_refresh">Atualizar</span></button>
  </div>

  <!-- Tracker: modal busca por ticker -->
  <div id="modal" class="modal hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <h2 data-i18n="modal_search_title">Buscar Ativo</h2>
      <div class="search-wrap">
        <input id="ticker-input" type="text"
               autocomplete="off" autocapitalize="characters" spellcheck="false"
               oninput="onTickerInput(this.value)" onkeydown="onTickerKey(event)" />
        <span id="search-spinner" class="spinner hidden"></span>
      </div>
      <div id="suggestions" class="suggestions hidden"></div>

      <div id="price-result" class="price-result hidden">
        <div class="pr-header">
          <div class="asset-icon lg" id="pr-icon">
            <img class="icon-img" alt="" />
            <span class="icon-text" id="pr-symbol"></span>
          </div>
          <div>
            <div class="pr-sym-label" id="pr-symbol-label"></div>
            <div class="pr-price" id="pr-price"></div>
          </div>
        </div>
        <div class="pr-meta">
          <span id="pr-change" class="pr-change"></span>
          <span id="pr-source" class="pr-source"></span>
        </div>
        <div id="pr-stats" class="pr-stats-grid" style="display:none"></div>
        <button class="btn-confirm" id="btn-confirm" onclick="confirmAdd()">
          + <span data-i18n="btn_add_list">Adicionar à lista</span>
        </button>
      </div>

      <div id="price-error" class="price-error hidden" data-i18n="not_found">
        Ativo não encontrado em nenhuma exchange.
      </div>

      <button class="btn-cancel" onclick="closeModal()" data-i18n="close">Fechar</button>
    </div>
  </div>

  <!-- Trade: modal adicionar trade -->
  <div id="trade-modal" class="modal hidden" onclick="if(event.target===this)closeTradeModal()">
    <div class="modal-box">
      <h2 data-i18n="trade_modal_title">Registrar Compra</h2>

      <!-- Hash import -->
      <div class="hash-import-wrap">
        <div class="hash-input-row">
          <input id="trade-hash-input" type="text" class="trade-input hash-input"
                 autocomplete="off" spellcheck="false"
                 placeholder="Cole hash de transação (opcional)"
                 oninput="onTxHashInput(this.value)" />
          <span id="trade-hash-spinner" class="spinner hidden"></span>
        </div>
        <div class="hash-net-row" id="hash-net-row">
          <button class="hash-net-chip active" onclick="selectHashNet(this,'')">Auto</button>
          <button class="hash-net-chip" onclick="selectHashNet(this,'hyperevm')">HyperEVM</button>
          <button class="hash-net-chip" onclick="selectHashNet(this,'ethereum')">Ethereum</button>
          <button class="hash-net-chip" onclick="selectHashNet(this,'base')">Base</button>
          <button class="hash-net-chip" onclick="selectHashNet(this,'arbitrum')">Arbitrum</button>
          <button class="hash-net-chip" onclick="selectHashNet(this,'optimism')">Optimism</button>
          <button class="hash-net-chip" onclick="selectHashNet(this,'bsc')">BSC</button>
          <button class="hash-net-chip" onclick="selectHashNet(this,'polygon')">Polygon</button>
          <button class="hash-net-chip" onclick="selectHashNet(this,'avalanche')">Avalanche</button>
          <button class="hash-net-chip" onclick="selectHashNet(this,'zksync')">zkSync</button>
          <button class="hash-net-chip" onclick="selectHashNet(this,'linea')">Linea</button>
          <button class="hash-net-chip" onclick="selectHashNet(this,'scroll')">Scroll</button>
          <button class="hash-net-chip" onclick="selectHashNet(this,'mantle')">Mantle</button>
          <button class="hash-net-chip" onclick="selectHashNet(this,'bitcoin')">Bitcoin</button>
          <button class="hash-net-chip" onclick="selectHashNet(this,'solana')">Solana</button>
        </div>
        <div id="trade-hash-result" class="hash-result hidden"></div>
      </div>

      <div class="search-wrap">
        <input id="trade-ticker-input" type="text"
               autocomplete="off" autocapitalize="characters" spellcheck="false"
               oninput="onTradeTickerInput(this.value)" onkeydown="onTradeTickerKey(event)" />
        <span id="trade-search-spinner" class="spinner hidden"></span>
      </div>
      <div id="trade-suggestions" class="suggestions hidden"></div>

      <div id="trade-price-preview" class="trade-price-preview hidden">
        <span data-i18n="cur_price_label">Preço atual:</span>
        <span id="trade-cur-price">—</span>
      </div>

      <div class="trade-mode-toggle">
        <button id="trade-mode-unit"  class="trade-mode-btn active" onclick="setTradeMode('unit')"  data-i18n="mode_unit">Por unidade</button>
        <button id="trade-mode-total" class="trade-mode-btn"        onclick="setTradeMode('total')" data-i18n="mode_total">Total pago</button>
      </div>

      <div class="trade-form-row">
        <div class="trade-form-col">
          <label class="trade-label" data-i18n="qty_label">Quantidade</label>
          <input id="trade-qty" type="number" step="any" min="0" placeholder="0.00"
                 class="trade-input" oninput="onTradeQtyInput()" />
        </div>
        <div class="trade-form-col" id="trade-col-price">
          <label class="trade-label" id="trade-price-label">Preço (USD)</label>
          <input id="trade-price" type="number" step="any" min="0" placeholder="0.00"
                 class="trade-input" oninput="onTradePriceInput()" />
        </div>
        <div class="trade-form-col hidden" id="trade-col-totalpaid">
          <label class="trade-label" id="trade-totalpaid-label">Total pago</label>
          <input id="trade-total-paid" type="number" step="any" min="0" placeholder="0.00"
                 class="trade-input" oninput="updateTradePreview()" />
        </div>
      </div>

      <!-- Investment row — only in unit mode -->
      <div class="trade-form-row" id="trade-row-investment">
        <div class="trade-form-col">
          <label class="trade-label" data-i18n="investment_label">Investimento (USD)</label>
          <input id="trade-investment" type="number" step="any" min="0" placeholder="0.00"
                 class="trade-input" oninput="onTradeInvestmentInput()" />
        </div>
      </div>

      <div id="trade-total-preview" class="trade-total-preview hidden">
        <span id="trade-preview-label" data-i18n="total_label">Total investido:</span>
        <strong id="trade-total-val">—</strong>
      </div>
      <div id="trade-derived-preview" class="trade-total-preview hidden">
        <span data-i18n="derived_price_label">Preço por token:</span>
        <strong id="trade-derived-val">—</strong>
      </div>

      <div class="trade-form-col" style="margin-top:4px">
        <label class="trade-label" data-i18n="date_label">Data (opcional)</label>
        <input id="trade-date" type="text" placeholder="2025-01-01 12:00:00" class="trade-input" />
      </div>

      <div id="trade-error" class="price-error hidden"></div>

      <button class="btn-confirm" onclick="submitTrade()">
        ✓ <span data-i18n="confirm_trade">Confirmar Compra</span>
      </button>
      <button class="btn-cancel" onclick="closeTradeModal()" data-i18n="close">Fechar</button>
    </div>
  </div>

  <!-- Alerts modal -->
  <div id="alerts-modal" class="modal hidden" onclick="if(event.target===this)closeAlertsModal()">
    <div class="modal-box">
      <h2 data-i18n="alert_title">🔔 Alertas de Preço</h2>

      <div class="alert-form">
        <div class="alert-form-row">
          <input id="alert-ticker" type="text" list="alert-tickers-list"
                 autocomplete="off" autocapitalize="characters" spellcheck="false"
                 class="trade-input" placeholder="BTC, ETH, SOL…" style="flex:1" />
          <datalist id="alert-tickers-list"></datalist>
          <select id="alert-direction" class="trade-input alert-select">
            <option value="above" data-i18n="alert_above">Acima de</option>
            <option value="below" data-i18n="alert_below">Abaixo de</option>
          </select>
          <input id="alert-target" type="number" step="any" min="0"
                 class="trade-input" placeholder="0.00" style="flex:1" />
        </div>
        <div id="alert-error" class="price-error hidden"></div>
        <button class="btn-confirm" onclick="submitAlert()">
          + <span data-i18n="alert_add_btn">Criar Alerta</span>
        </button>
      </div>

      <div id="alerts-list" class="alerts-list"></div>

      <button class="btn-cancel" onclick="closeAlertsModal()" data-i18n="close">Fechar</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="/static/i18n.js"></script>
  <script src="/static/app.js"></script>
  <script src="/static/trade.js"></script>
  <script src="/static/alerts.js"></script>
</body>
</html>
