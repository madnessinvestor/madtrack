<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>MadTracker</title>
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>MadTracker</h1>
    <div class="header-actions">
      <button id="btn-theme" onclick="toggleTheme()" title="Tema"></button>
      <button id="btn-currency" onclick="toggleCurrency()" title="Moeda">$</button>
      <button id="btn-add" onclick="openModal()">+ Adicionar</button>
    </div>
  </header>

  <main id="asset-list">
    <div class="loading">Carregando...</div>
  </main>

  <div class="refresh-bar">
    <span id="last-update">—</span>
    <button onclick="loadAssets()">↻ Atualizar</button>
  </div>

  <!-- Modal busca por ticker -->
  <div id="modal" class="modal hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <h2>Buscar Ativo</h2>
      <div class="search-wrap">
        <input id="ticker-input" type="text" placeholder="Digite o ticker: BTC, ETH, SOL..."
               autocomplete="off" autocapitalize="characters" spellcheck="false"
               oninput="onTickerInput(this.value)" onkeydown="onTickerKey(event)" />
        <span id="search-spinner" class="spinner hidden"></span>
      </div>
      <div id="suggestions" class="suggestions hidden"></div>

      <div id="price-result" class="price-result hidden">
        <div class="pr-header">
          <div class="asset-icon lg" id="pr-icon">
            <img class="icon-img" alt="" />
            <span class="icon-text" id="pr-symbol"></span>
          </div>
          <div>
            <div class="pr-sym-label" id="pr-symbol-label"></div>
            <div class="pr-price" id="pr-price"></div>
          </div>
        </div>
        <div class="pr-meta">
          <span id="pr-change" class="pr-change"></span>
          <span id="pr-source" class="pr-source"></span>
        </div>
        <div id="pr-stats" class="pr-stats-grid" style="display:none"></div>
        <button class="btn-confirm" id="btn-confirm" onclick="confirmAdd()">+ Adicionar à lista</button>
      </div>

      <div id="price-error" class="price-error hidden">
        Ativo não encontrado em nenhuma exchange.
      </div>

      <button class="btn-cancel" onclick="closeModal()">Fechar</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
