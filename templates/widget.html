<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MadTracker Widget</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    font-family: 'Roboto Mono', 'Droid Sans Mono', 'Courier New', monospace;
    color: #ffffff;
    overflow: hidden;
  }

  .widget {
    width: 100%;
    height: 100%;
    padding: 6px 10px 4px;
    display: flex;
    flex-direction: column;
    background: rgba(8, 10, 20, 0.75);
    border-radius: 16px;
  }

  .widget-header {
    font-size: 11px;
    color: #aaaaaa;
    margin-bottom: 4px;
    letter-spacing: 0.01em;
  }

  /* Two-column layout: each column is a mini table */
  .widget-cols {
    display: flex;
    gap: 8px;
    flex: 1;
    align-items: start;
  }

  .widget-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Each row: ticker (left), price (right), change (right) */
  .w-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    column-gap: 5px;
    align-items: baseline;
    padding: 2px 0;
    line-height: 1.3;
    overflow: hidden;
  }

  .w-ticker {
    font-size: 12px;
    font-weight: 400;
    color: #e4e4e4;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .w-price {
    font-size: 12px;
    color: #e4e4e4;
    text-align: right;
    white-space: nowrap;
  }

  .w-chg {
    font-size: 12px;
    font-weight: 600;
    text-align: right;
    white-space: nowrap;
    min-width: 42px;
  }

  .pos { color: #4dff8e; }
  .neg { color: #ff4d4d; }
  .neu { color: #888888; }
</style>
</head>
<body>
<div class="widget">
  <div class="widget-header" id="wh">Carregando...</div>
  <div class="widget-cols">
    <div class="widget-col" id="wc1"></div>
    <div class="widget-col" id="wc2"></div>
  </div>
</div>

<script>
  function fmtPrice(p) {
    if (p == null) return "—";
    if (p >= 10000) return p.toLocaleString("en-US", { maximumFractionDigits: 2, minimumFractionDigits: 2 });
    if (p >= 1)     return p.toLocaleString("en-US", { maximumFractionDigits: 2, minimumFractionDigits: 2 });
    if (p >= 0.01)  return p.toFixed(4);
    return p.toPrecision(3);
  }

  function fmtChange(price, pct) {
    if (price == null || pct == null) return { text: "—", cls: "neu" };
    const prev = price / (1 + pct / 100);
    const abs  = price - prev;
    let text;
    const sign = abs >= 0 ? "+" : "";
    const a = Math.abs(abs);
    if (a >= 100)   text = sign + abs.toFixed(2);
    else if (a >= 1)text = sign + abs.toFixed(2);
    else if (a >= 0.001) text = sign + abs.toFixed(3);
    else            text = sign + abs.toPrecision(2);
    const cls = abs > 0.00005 ? "pos" : abs < -0.00005 ? "neg" : "neu";
    return { text, cls };
  }

  function trunc(sym, n) {
    return sym.length > n ? sym.slice(0, n - 3) + "..." : sym;
  }

  function rowHtml(a) {
    if (!a) return "";
    const { text: chg, cls } = fmtChange(a.price, a.change24h);
    return `<div class="w-row">
      <span class="w-ticker">${trunc(a.symbol, 12)}</span>
      <span class="w-price">${fmtPrice(a.price)}</span>
      <span class="w-chg ${cls}">${chg}</span>
    </div>`;
  }

  async function load() {
    try {
      const r = await fetch("/api/assets");
      const data = await r.json();

      const now = new Date();
      const hh = now.getHours().toString().padStart(2,"0");
      const mm = now.getMinutes().toString().padStart(2,"0");
      document.getElementById("wh").textContent = "Last fetch: " + hh + ":" + mm;

      const half = Math.ceil(data.length / 2);
      document.getElementById("wc1").innerHTML = data.slice(0, half).map(rowHtml).join("");
      document.getElementById("wc2").innerHTML = data.slice(half).map(rowHtml).join("");
    } catch(e) {
      document.getElementById("wh").textContent = "Erro ao carregar";
    }
  }

  load();
  setInterval(load, 60000);
</script>
</body>
</html>
