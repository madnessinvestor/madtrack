<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MadTracker Widget</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    font-family: 'Roboto Mono', 'Droid Sans Mono', 'Courier New', monospace;
    color: #ffffff;
    overflow: hidden;
  }

  .widget {
    width: 100%;
    height: 100%;
    padding: 6px 10px 4px;
    display: flex;
    flex-direction: column;
    background: rgba(8, 10, 20, 0.75);
    border-radius: 16px;
  }

  .widget-header {
    font-size: 11px;
    color: #aaaaaa;
    margin-bottom: 5px;
    letter-spacing: 0.01em;
  }

  /* Two columns side by side */
  .widget-cols {
    display: flex;
    gap: 10px;
    flex: 1;
    align-items: start;
    overflow: hidden;
  }

  /*
   * Each column is a CSS grid with 3 named areas:
   *   ticker | price | pct
   * All rows share the same column template → guaranteed alignment.
   */
  .widget-col {
    flex: 1;
    display: grid;
    /* ticker flexible, price right-aligned fixed, pct right-aligned fixed */
    grid-template-columns: 1fr max-content max-content;
    column-gap: 6px;
    align-content: start;
    overflow: hidden;
  }

  /* Each "cell" in the grid — 3 cells = one row */
  .w-ticker,
  .w-price,
  .w-pct {
    font-size: 12px;
    padding: 2px 0;
    line-height: 1.35;
    white-space: nowrap;
    overflow: hidden;
  }

  .w-ticker {
    color: #e4e4e4;
    text-overflow: ellipsis;
    font-weight: 400;
  }

  .w-price {
    color: #e4e4e4;
    text-align: right;
  }

  .w-pct {
    font-weight: 600;
    text-align: right;
    min-width: 44px;
  }

  .pos { color: #4dff8e; }
  .neg { color: #ff4d4d; }
  .neu { color: #888888; }
</style>
</head>
<body>
<div class="widget">
  <div class="widget-header" id="wh">Carregando...</div>
  <div class="widget-cols">
    <div class="widget-col" id="wc1"></div>
    <div class="widget-col" id="wc2"></div>
  </div>
</div>

<script>
  function fmtPrice(p) {
    if (p == null) return "—";
    if (p >= 10000) return p.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (p >= 1)     return p.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (p >= 0.01)  return p.toFixed(4);
    return p.toPrecision(3);
  }

  function fmtPct(pct) {
    if (pct == null) return { text: "—", cls: "neu" };
    const sign = pct >= 0 ? "+" : "";
    const text = sign + pct.toFixed(2) + "%";
    const cls = pct > 0.005 ? "pos" : pct < -0.005 ? "neg" : "neu";
    return { text, cls };
  }

  function trunc(sym, n) {
    return sym.length > n ? sym.slice(0, n - 3) + "..." : sym;
  }

  /* Returns 3 span elements (cells in the shared grid) */
  function cellsHtml(a) {
    if (!a) {
      return `<span class="w-ticker"></span><span class="w-price"></span><span class="w-pct"></span>`;
    }
    const { text: pct, cls } = fmtPct(a.change24h);
    return `<span class="w-ticker">${trunc(a.symbol, 12)}</span>` +
           `<span class="w-price">${fmtPrice(a.price)}</span>` +
           `<span class="w-pct ${cls}">${pct}</span>`;
  }

  async function load() {
    try {
      const r = await fetch("/api/assets");
      const data = await r.json();

      const now = new Date();
      const hh = now.getHours().toString().padStart(2, "0");
      const mm = now.getMinutes().toString().padStart(2, "0");
      document.getElementById("wh").textContent = "Last fetch: " + hh + ":" + mm;

      const half = Math.ceil(data.length / 2);
      const col1 = data.slice(0, half);
      const col2 = data.slice(half);

      document.getElementById("wc1").innerHTML = col1.map(cellsHtml).join("");
      document.getElementById("wc2").innerHTML = col2.map(cellsHtml).join("");
    } catch(e) {
      document.getElementById("wh").textContent = "Erro ao carregar";
    }
  }

  load();
  setInterval(load, 60000);
</script>
</body>
</html>
