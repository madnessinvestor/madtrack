<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoAIO Widget</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent: #00e676;
    --bg:     #0f0f14;
    --surf:   #1a1a24;
    --border: rgba(255,255,255,0.08);
    --text:   #e8e8e8;
    --muted:  #888;
  }

  [data-theme="light"] {
    --accent: #00a854;
    --bg:     #f4f4f4;
    --surf:   #ffffff;
    --border: rgba(0,0,0,0.10);
    --text:   #111111;
    --muted:  #888;
  }

  html {
    background: transparent !important;
  }

  body {
    width: 100%;
    min-height: 100%;
    background: transparent !important;
    font-family: 'Roboto Mono', 'Droid Sans Mono', 'Courier New', monospace;
    color: var(--text);
    overflow: hidden;
    padding: 6px;
    box-sizing: border-box;
  }

  .widget {
    width: 100%;
    padding: 10px 12px 14px;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    border-radius: 20px;
    overflow: hidden;
  }

  /* ── Top bar ──────────────────────────────────────────────── */
  .widget-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
    gap: 6px;
    flex-shrink: 0;
  }

  .widget-header {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    flex: 1;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .refresh-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    transition: color 0.15s;
  }
  .refresh-btn:active { color: var(--accent); }

  /* quick controls */
  .widget-controls {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-shrink: 0;
  }

  .pill-group {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }

  .pill {
    font-family: inherit;
    font-size: 9.5px;
    font-weight: 600;
    color: var(--muted);
    background: transparent;
    border: none;
    padding: 2px 6px;
    cursor: pointer;
    line-height: 1;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .pill.active {
    background: rgba(0,210,100,0.25);
    color: var(--accent);
  }
  .pill:not(:last-child) { border-right: 1px solid var(--border); }

  /* ── Data area ────────────────────────────────────────────── */
  .widget-cols {
    display: flex;
    gap: 10px;
    flex: 1;
    align-items: start;
    overflow: hidden;
  }

  .widget-col {
    flex: 1;
    display: grid;
    grid-template-columns: max-content 1fr max-content max-content;
    column-gap: 5px;
    align-content: start;
    overflow: hidden;
  }

  .w-icon {
    width: 14px; height: 14px;
    border-radius: 50%;
    object-fit: cover;
    align-self: center;
    flex-shrink: 0;
  }
  .w-ticker, .w-price, .w-chg {
    padding: 2px 0;
    line-height: 1.35;
    white-space: nowrap;
    overflow: hidden;
  }
  .w-ticker { color: var(--text); text-overflow: ellipsis; }
  .w-price  { color: var(--text); text-align: right; }
  .w-chg    { text-align: right; min-width: 48px; }
  .w-bell   { color: #f59e0b; font-size: 0.75em; margin-left: 3px; vertical-align: middle; line-height: 1; }

  .pos { color: var(--accent); }
  .neg { color: #ff4d4d; }
  .neu { color: #888888; }

  /* ── Trades section ─────────────────────────────────────────── */
  .wt-trades-divider {
    height: 1px;
    background: rgba(255,255,255,0.10);
    margin: 6px 0 4px;
  }
  [data-theme="light"] .wt-trades-divider { background: rgba(0,0,0,0.10); }
  .wt-trades-section {
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding-top: 2px;
  }
  .wt-trade-item { width: 100%; padding: 1px 0; }
  .wt-trade-top  { display: flex; align-items: center; gap: 4px; width: 100%; }
  .wt-trade-bot  { display: flex; justify-content: space-between; min-height: 1em; }
  .wt-trade-ticker  { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .wt-trade-qty     { font-size: 0.88em; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
  .wt-trade-val     { text-align: right; white-space: nowrap; color: var(--text); flex-shrink: 0; }
  .wt-trade-pnl-val { text-align: right; white-space: nowrap; flex-shrink: 0; }
  .wt-trade-pnl-pct { text-align: right; white-space: nowrap; flex-shrink: 0; }
  .pos { color: var(--accent); }
  .neg { color: #ff4d4d; }
  .wt-trade-empty { font-size: 0.9em; color: var(--muted); text-align: center; padding: 4px 0; }

  /* ── 2-row-per-asset layout ──────────────────────────────── */
  .widget-col.w-2row-mode {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .w-asset-2r { width: 100%; padding: 1px 0; }
  .w-2r-top {
    display: flex;
    align-items: center;
    gap: 4px;
    width: 100%;
  }
  .w-2r-top .w-ticker { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .w-2r-top .w-price,
  .w-2r-top .w-chg    { flex-shrink: 0; }
  .w-2r-bot {
    display: flex;
    justify-content: flex-end;
    min-height: 1em;
  }

</style>
</head>
<body>
<div class="widget">
  <!-- Top bar -->
  <div class="widget-topbar" id="topbar">
    <span class="widget-header" id="wh">
      <span id="wh-text">Carregando...</span>
      <button class="refresh-btn" id="refresh-btn" onclick="load()" title="Atualizar">↻</button>
    </span>
    <div class="widget-controls" id="controls">
      <div class="pill-group" id="ccy-group">
        <button class="pill" data-ccy="USD" onclick="setCcy('USD')">$</button>
        <button class="pill" data-ccy="BRL" onclick="setCcy('BRL')">R$</button>
        <button class="pill" data-ccy="EUR" onclick="setCcy('EUR')">€</button>
      </div>
      <div class="pill-group" id="chg-group">
        <button class="pill" data-chg="pct"  onclick="setChg('pct')">%</button>
        <button class="pill" data-chg="val"  onclick="setChg('val')" id="chg-val-btn">±$</button>
        <button class="pill" data-chg="both" onclick="setChg('both')">%+$</button>
      </div>
    </div>
  </div>

  <div class="widget-cols" id="widget-cols">
    <div class="widget-col" id="wc1"></div>
    <div class="widget-col" id="wc2"></div>
  </div>
  <!-- Trades section (shown when showTrades is enabled) -->
  <div class="wt-trades-divider" id="wt-trades-divider" style="display:none"></div>
  <div class="wt-trades-section" id="wt-trades" style="display:none"></div>
</div>

<script>
  // ── Config defaults (all w_* keys — shared with main app Widget tab) ─────────
  const DEFAULTS = {
    ccy:          "USD",
    chg:          "pct",
    cols:         "2",
    rows:         "1",
    fontSize:     "md",
    bold:         false,
    showCcy:      true,
    showHeader:   true,
    autoSort:     false,
    showRefresh:  false,
    showControls: true,
    showTrades:   false,
    showChg:      true,
    showIcon:     true,
    size:         "sm",
    theme:        "dark",
    bgOpacity:    "100",
    refresh:      "15",
    assets:       "",
  };

  function readCfg() {
    const c = {};
    for (const [k, def] of Object.entries(DEFAULTS)) {
      const raw = localStorage.getItem("w_" + k);
      if (raw === null) c[k] = def;
      else if (typeof def === "boolean") c[k] = raw === "1";
      else c[k] = raw;
    }
    return c;
  }

  function writeCfg(key, val) {
    localStorage.setItem("w_" + key, typeof val === "boolean" ? (val ? "1" : "0") : val);
    cfg[key] = val;
  }

  let cfg = readCfg();

  // ── Rate data ───────────────────────────────────────────────
  let rates        = { BRL: 5.70, EUR: 0.92 };
  let lastData     = [];
  let alertsByTicker = {};

  const CCY_SYM  = { USD: "$", BRL: "R$", EUR: "€" };
  function ccyRate() { return { USD: 1, BRL: rates.BRL, EUR: rates.EUR }[cfg.ccy] || 1; }

  // ── Formatting ──────────────────────────────────────────────
  const FS_MAP = { sm: "10.5px", md: "12px", lg: "14px" };

  function fmtPrice(usdP) {
    if (usdP == null) return "—";
    const p   = usdP * ccyRate();
    const sym = cfg.showCcy ? CCY_SYM[cfg.ccy] : "";
    const a   = Math.abs(p);
    if (a >= 10000) return sym + p.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
    if (a >= 1)     return sym + p.toFixed(2);
    if (a >= 0.01)  return sym + p.toFixed(4);
    return sym + p.toPrecision(3);
  }

  function _fmtPct(pct) {
    if (pct == null) return { text: "—", cls: "neu" };
    const s   = pct >= 0 ? "+" : "";
    const cls = pct > 0.005 ? "pos" : pct < -0.005 ? "neg" : "neu";
    return { text: s + pct.toFixed(2) + "%", cls };
  }

  function _fmtVal(usdP, pct) {
    if (usdP == null || pct == null) return { text: "—", cls: "neu" };
    const prev = usdP / (1 + pct / 100);
    const abs  = (usdP - prev) * ccyRate();
    const sym  = cfg.showCcy ? CCY_SYM[cfg.ccy] : "";
    const s    = abs >= 0 ? "+" : "-";
    const cls  = abs > 0.000005 ? "pos" : abs < -0.000005 ? "neg" : "neu";
    const a    = Math.abs(abs);
    let num;
    if (a >= 100)       num = a.toFixed(2);
    else if (a >= 1)    num = a.toFixed(2);
    else if (a >= 0.01) num = a.toFixed(4);
    else                num = a.toPrecision(2);
    return { text: s + sym + num, cls };
  }

  function fmtChg(usdP, pct) {
    if (!cfg.showChg) return { text: "", cls: "neu" };
    if (cfg.chg === "pct")  return _fmtPct(pct);
    if (cfg.chg === "val")  return _fmtVal(usdP, pct);
    if (cfg.chg === "both") {
      const p = _fmtPct(pct);
      const v = _fmtVal(usdP, pct);
      return { text: v.text + " (" + p.text + ")", cls: p.cls };
    }
    return _fmtPct(pct);
  }

  function trunc(sym, n) {
    return sym.length > n ? sym.slice(0, n - 3) + "..." : sym;
  }

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function cellsHtml(a, fs) {
    if (!a) return (cfg.showIcon ? `<img class="w-icon">` : "") +
      `<span class="w-ticker"></span><span class="w-price"></span><span class="w-chg"></span>`;
    const { text: chg, cls } = fmtChg(a.price, a.change24h);
    const fw  = cfg.bold ? "font-weight:700;" : "";
    const fss = `font-size:${fs};`;
    const tickerAlerts = alertsByTicker[(a.symbol || "").toUpperCase()] || [];
    const activeAlerts = tickerAlerts.filter(al => !al.triggered);
    const bellTitle = activeAlerts.map(al =>
      (al.direction === "above" ? "↑" : "↓") + " $" + Number(al.target).toLocaleString("en-US")
    ).join(" • ");
    const bell = activeAlerts.length
      ? `<span class="w-bell" title="${esc(bellTitle)}">🔔</span>` : "";
    const rawSym  = a.symbol || "";
    const symTrunc = trunc(rawSym, 12);
    const _FOREX_FLAG = { USD:'us', EUR:'eu', BRL:'br', GBP:'gb', JPY:'jp', CHF:'ch', AUD:'au', CAD:'ca' };
    const _symUp = rawSym.toUpperCase();
    const _forexCc = _symUp.length === 6 ? _FOREX_FLAG[_symUp.slice(0,3)] : null;
    const _iconSrc = _forexCc
      ? `https://flagcdn.com/48x36/${_forexCc}.png`
      : `/static/icons/tokens/${esc(_symUp)}.png`;
    const iconHtml = cfg.showIcon
      ? `<img class="w-icon" src="${_iconSrc}" alt="" onerror="this.style.visibility='hidden';this.style.width='0'">`
      : "";
    return iconHtml +
           `<span class="w-ticker" style="${fss}${fw}">${esc(symTrunc)}${bell}</span>` +
           `<span class="w-price"  style="${fss}${fw}">${esc(fmtPrice(a.price))}</span>` +
           `<span class="w-chg ${cls}" style="${fss}${fw}">${esc(chg)}</span>`;
  }

  // ── 2-row renderer ──────────────────────────────────────────
  function asset2RowHtml(a, fs) {
    if (!a) return "";
    const fw     = cfg.bold ? "font-weight:700;" : "";
    const fss    = `font-size:${fs};`;
    const rawSym = a.symbol || "";
    const symTrunc = trunc(rawSym, 12);
    const _FOREX_FLAG = { USD:'us', EUR:'eu', BRL:'br', GBP:'gb', JPY:'jp', CHF:'ch', AUD:'au', CAD:'ca' };
    const _symUp = rawSym.toUpperCase();
    const _forexCc = _symUp.length === 6 ? _FOREX_FLAG[_symUp.slice(0,3)] : null;
    const _iconSrc = _forexCc
      ? `https://flagcdn.com/48x36/${_forexCc}.png`
      : `/static/icons/tokens/${esc(_symUp)}.png`;
    const iconHtml = cfg.showIcon
      ? `<img class="w-icon" src="${_iconSrc}" alt="" onerror="this.style.visibility='hidden';this.style.width='0'">`
      : "";
    const tickerAlerts = alertsByTicker[_symUp] || [];
    const activeAlerts = tickerAlerts.filter(al => !al.triggered);
    const bellTitle = activeAlerts.map(al =>
      (al.direction === "above" ? "↑" : "↓") + " $" + Number(al.target).toLocaleString("en-US")
    ).join(" • ");
    const bell = activeAlerts.length
      ? `<span class="w-bell" title="${esc(bellTitle)}">🔔</span>` : "";
    let topChg = "", botChg = "";
    if (cfg.showChg) {
      if (cfg.chg === "both") {
        const v = _fmtVal(a.price, a.change24h);
        const p = _fmtPct(a.change24h);
        topChg = `<span class="w-chg ${v.cls}" style="${fss}${fw}">${esc(v.text)}</span>`;
        botChg = `<span class="w-chg ${p.cls}" style="${fss}${fw}">${esc(p.text)}</span>`;
      } else {
        const { text, cls } = fmtChg(a.price, a.change24h);
        botChg = `<span class="w-chg ${cls}" style="${fss}${fw}">${esc(text)}</span>`;
      }
    }
    return `<div class="w-asset-2r">
      <div class="w-2r-top" style="${fss}">
        ${iconHtml}
        <span class="w-ticker" style="${fss}${fw}">${esc(symTrunc)}${bell}</span>
        <span class="w-price"  style="${fss}${fw}">${esc(fmtPrice(a.price))}</span>
        ${topChg}
      </div>
      <div class="w-2r-bot">${botChg}</div>
    </div>`;
  }

  // ── Theme ───────────────────────────────────────────────────
  function applyTheme(theme) {
    let resolved = theme;
    if (theme === "auto") {
      resolved = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    }
    document.documentElement.setAttribute("data-theme", resolved);
  }

  // ── Render ──────────────────────────────────────────────────
  function applyLayout() {
    cfg = readCfg();

    applyTheme(cfg.theme || "dark");

    // Background opacity
    const opacity = Math.min(100, Math.max(0, parseInt(cfg.bgOpacity ?? "100", 10))) / 100;
    document.querySelector(".widget").style.backgroundColor =
      opacity === 0 ? "transparent" : `rgba(${
        document.documentElement.getAttribute("data-theme") === "light"
          ? "244,244,244"
          : "15,15,20"
      },${opacity})`;

    const fs = FS_MAP[cfg.fontSize] || "12px";
    document.getElementById("widget-cols").style.setProperty("font-size", fs);

    const wc2 = document.getElementById("wc2");
    wc2.style.display = cfg.cols === "1" ? "none" : "";

    const topbar = document.getElementById("topbar");
    topbar.style.display = (cfg.showHeader || cfg.showControls) ? "" : "none";

    document.getElementById("wh").style.display          = cfg.showHeader   ? "" : "none";
    document.getElementById("refresh-btn").style.display = cfg.showRefresh  ? "" : "none";
    document.getElementById("controls").style.display    = cfg.showControls ? "" : "none";

    // Icon column: adjust grid and visibility; handle 2-row mode
    const is2Row   = cfg.rows === "2";
    const gridCols = cfg.showIcon
      ? "max-content 1fr max-content max-content"
      : "1fr max-content max-content";
    document.querySelectorAll(".widget-col").forEach(col => {
      col.classList.toggle("w-2row-mode", is2Row);
      if (!is2Row) {
        col.style.display             = "grid";
        col.style.flexDirection       = "";
        col.style.gridTemplateColumns = gridCols;
      } else {
        col.style.display             = "flex";
        col.style.flexDirection       = "column";
        col.style.gridTemplateColumns = "";
      }
    });
    // Re-apply wc2 visibility after the loop (overrides display set above)
    wc2.style.display = cfg.cols === "1" ? "none" : (is2Row ? "flex" : "grid");

    document.querySelectorAll("#ccy-group .pill").forEach(b =>
      b.classList.toggle("active", b.dataset.ccy === cfg.ccy));
    document.querySelectorAll("#chg-group .pill").forEach(b =>
      b.classList.toggle("active", b.dataset.chg === cfg.chg));

    const vb = document.getElementById("chg-val-btn");
    if (vb) vb.textContent = "±" + (cfg.showCcy ? CCY_SYM[cfg.ccy] : "$");
  }

  function render() {
    applyLayout();
    let data = [...lastData];

    // Filter to selected assets
    const selected = cfg.assets ? cfg.assets.split(",").filter(Boolean) : [];
    if (selected.length) {
      data = data.filter(a => selected.includes((a.symbol || "").toUpperCase()));
      data.sort((a, b) =>
        selected.indexOf((a.symbol || "").toUpperCase()) -
        selected.indexOf((b.symbol || "").toUpperCase())
      );
    }

    if (cfg.autoSort) {
      data.sort((a, b) => (b.change24h || 0) - (a.change24h || 0));
    }

    const fs     = FS_MAP[cfg.fontSize] || "12px";
    const cellFn = cfg.rows === "2" ? asset2RowHtml : cellsHtml;
    const half   = cfg.cols === "1" ? data.length : Math.ceil(data.length / 2);
    const col1   = data.slice(0, half);
    const col2   = cfg.cols === "1" ? [] : data.slice(half);

    document.getElementById("wc1").innerHTML = col1.map(a => cellFn(a, fs)).join("");
    document.getElementById("wc2").innerHTML = col2.map(a => cellFn(a, fs)).join("");

    renderTrades();
  }

  // ── Quick-control handlers ──────────────────────────────────
  function setCcy(v) { writeCfg("ccy", v); render(); }
  function setChg(v) { writeCfg("chg", v); render(); }

  // ── Trades section renderer ──────────────────────────────────
  let portfolioData = [];

  function renderTrades() {
    const divider = document.getElementById("wt-trades-divider");
    const section = document.getElementById("wt-trades");
    if (!divider || !section) return;

    if (!cfg.showTrades) {
      divider.style.display = "none";
      section.style.display = "none";
      return;
    }

    divider.style.display = "";
    section.style.display = "";

    const tokens = portfolioData;
    if (!tokens.length) {
      section.innerHTML = `<div class="wt-trade-empty">Sem posições registradas</div>`;
      return;
    }

    const rate   = ccyRate();
    const sym    = cfg.showCcy ? CCY_SYM[cfg.ccy] : "";
    const fs     = FS_MAP[cfg.fontSize] || "12px";
    const fw     = cfg.bold ? "font-weight:700;" : "";

    function fmtV(usd) {
      const v = usd * rate;
      const a = Math.abs(v);
      if (a >= 10000) return sym + v.toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
      if (a >= 1)     return sym + v.toFixed(2);
      if (a >= 0.01)  return sym + v.toFixed(4);
      return sym + v.toPrecision(3);
    }

    const rows = tokens.map(tok => {
      const ticker  = esc((tok.ticker || "").toUpperCase());
      const trades  = tok.trades || [];
      const curP    = tok.current_price;
      let totalQty  = 0, totalCost = 0;
      for (const tr of trades) {
        const q = parseFloat(tr.qty) || 0;
        const p = parseFloat(tr.price_paid) || 0;
        totalQty  += q;
        totalCost += q * p;
      }
      const avgPrice  = totalQty ? totalCost / totalQty : 0;
      const curVal    = curP != null ? totalQty * curP : null;
      const pnlUsd    = curP != null ? (curP - avgPrice) * totalQty : null;
      const pnlPct    = avgPrice > 0 && curP != null ? (curP - avgPrice) / avgPrice * 100 : null;
      const curValStr = curVal != null ? fmtV(curVal) : "—";

      let pnlValStr = "—", pnlPctStr = "", pnlCls = "neu";
      if (pnlUsd != null) {
        const pnlC = pnlUsd * rate;
        const s    = pnlC >= 0 ? "+" : "-";
        const a    = Math.abs(pnlC);
        const num  = a >= 100 ? a.toFixed(2) : a >= 1 ? a.toFixed(2) : a.toFixed(4);
        pnlValStr = s + sym + num;
        pnlCls    = pnlC > 0.00001 ? "pos" : pnlC < -0.00001 ? "neg" : "neu";
      }
      if (pnlPct != null) {
        const sp  = pnlPct >= 0 ? "+" : "";
        pnlPctStr = sp + pnlPct.toFixed(2) + "%";
      }

      const qtyStr = totalQty !== 0
        ? (Math.abs(totalQty) >= 1 ? totalQty.toFixed(4).replace(/\.?0+$/, "") : totalQty.toPrecision(4)) + " un"
        : "0";

      return `<div class="wt-trade-item" style="font-size:${fs}">
        <div class="wt-trade-top">
          <span class="wt-trade-ticker" style="${fw}">${ticker}</span>
          <span class="wt-trade-val"    style="${fw}">${esc(curValStr)}</span>
          <span class="wt-trade-pnl-val ${pnlCls}">${esc(pnlValStr)}</span>
        </div>
        <div class="wt-trade-bot">
          <span class="wt-trade-qty">${esc(qtyStr)}</span>
          <span class="wt-trade-pnl-pct ${pnlCls}">${esc(pnlPctStr)}</span>
        </div>
      </div>`;
    });
    section.innerHTML = rows.join("");
  }

  // ── Data fetch ──────────────────────────────────────────────
  let _refreshInterval = null;

  async function load() {
    try {
      const fetches = [fetch("/api/assets"), fetch("/api/rates"), fetch("/api/alerts")];
      if (cfg.showTrades) fetches.push(fetch("/api/portfolio"));
      const [ra, rr, ral, rp] = await Promise.all(fetches);
      const data   = await ra.json();
      const rdata  = await rr.json();
      const alData = await ral.json().catch(() => []);
      if (rp) portfolioData = await rp.json().catch(() => []);
      if (rdata.BRL) rates.BRL = rdata.BRL;
      if (rdata.EUR) rates.EUR = rdata.EUR;
      lastData = data;
      alertsByTicker = {};
      for (const al of (Array.isArray(alData) ? alData : [])) {
        const k = al.ticker.toUpperCase();
        if (!alertsByTicker[k]) alertsByTicker[k] = [];
        alertsByTicker[k].push(al);
      }
      const now = new Date();
      const hh  = now.getHours().toString().padStart(2, "0");
      const mm  = now.getMinutes().toString().padStart(2, "0");
      document.getElementById("wh-text").textContent = "Last fetch: " + hh + ":" + mm;
      render();
    } catch(e) {
      document.getElementById("wh-text").textContent = "Erro ao carregar";
    }
  }

  function scheduleRefresh() {
    if (_refreshInterval) clearInterval(_refreshInterval);
    const mins = parseInt(cfg.refresh, 10) || 15;
    _refreshInterval = setInterval(load, mins * 60 * 1000);
  }

  // ── React to config changes made in the main app (same origin, other tab/page)
  window.addEventListener("storage", (e) => {
    if (e.key && e.key.startsWith("w_")) {
      render();
      scheduleRefresh();
    }
  });

  // ── Init ────────────────────────────────────────────────────
  applyLayout();
  load();
  scheduleRefresh();
</script>
</body>
</html>
