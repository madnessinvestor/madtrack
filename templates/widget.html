<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoAIO Widget</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent: #00e676;
    --bg:     #0f0f14;
    --surf:   #1a1a24;
    --border: rgba(255,255,255,0.08);
    --text:   #e8e8e8;
    --muted:  #888;
  }

  [data-theme="light"] {
    --accent: #00a854;
    --bg:     #f4f4f4;
    --surf:   #ffffff;
    --border: rgba(0,0,0,0.10);
    --text:   #111111;
    --muted:  #888;
  }

  html {
    background: transparent !important;
  }

  body {
    width: 100%;
    min-height: 100%;
    background: transparent !important;
    font-family: 'Roboto Mono', 'Droid Sans Mono', 'Courier New', monospace;
    color: var(--text);
    overflow: hidden;
    padding: 6px;
    box-sizing: border-box;
  }

  .widget {
    width: 100%;
    padding: 10px 12px 14px;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    border-radius: 20px;
    overflow: hidden;
  }

  /* ── Top bar ──────────────────────────────────────────────── */
  .widget-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
    gap: 6px;
    flex-shrink: 0;
  }

  .widget-header {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    flex: 1;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .refresh-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    transition: color 0.15s;
  }
  .refresh-btn:active { color: var(--accent); }

  /* quick controls */
  .widget-controls {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-shrink: 0;
  }

  .pill-group {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }

  .pill {
    font-family: inherit;
    font-size: 9.5px;
    font-weight: 600;
    color: var(--muted);
    background: transparent;
    border: none;
    padding: 2px 6px;
    cursor: pointer;
    line-height: 1;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .pill.active {
    background: rgba(0,210,100,0.25);
    color: var(--accent);
  }
  .pill:not(:last-child) { border-right: 1px solid var(--border); }

  /* ── Data area ────────────────────────────────────────────── */
  .widget-cols {
    display: flex;
    gap: 10px;
    flex: 1;
    align-items: start;
    overflow: hidden;
  }

  .widget-col {
    flex: 1;
    display: grid;
    grid-template-columns: max-content 1fr max-content max-content;
    column-gap: 5px;
    align-content: start;
    overflow: hidden;
  }

  .w-icon {
    width: 14px; height: 14px;
    border-radius: 50%;
    object-fit: cover;
    align-self: center;
    flex-shrink: 0;
  }
  .w-ticker, .w-price, .w-chg {
    padding: 2px 0;
    line-height: 1.35;
    white-space: nowrap;
    overflow: hidden;
  }
  .w-ticker { color: var(--text); text-overflow: ellipsis; }
  .w-price  { color: var(--text); text-align: right; }
  .w-chg    { text-align: right; min-width: 48px; }
  .w-bell   { color: #f59e0b; font-size: 0.75em; margin-left: 3px; vertical-align: middle; line-height: 1; }

  .pos { color: var(--accent); }
  .neg { color: #ff4d4d; }
  .neu { color: #888888; }

</style>
</head>
<body>
<div class="widget">
  <!-- Top bar -->
  <div class="widget-topbar" id="topbar">
    <span class="widget-header" id="wh">
      <span id="wh-text">Carregando...</span>
      <button class="refresh-btn" id="refresh-btn" onclick="load()" title="Atualizar">↻</button>
    </span>
    <div class="widget-controls" id="controls">
      <div class="pill-group" id="ccy-group">
        <button class="pill" data-ccy="USD" onclick="setCcy('USD')">$</button>
        <button class="pill" data-ccy="BRL" onclick="setCcy('BRL')">R$</button>
        <button class="pill" data-ccy="EUR" onclick="setCcy('EUR')">€</button>
      </div>
      <div class="pill-group" id="chg-group">
        <button class="pill" data-chg="pct"  onclick="setChg('pct')">%</button>
        <button class="pill" data-chg="val"  onclick="setChg('val')" id="chg-val-btn">±$</button>
        <button class="pill" data-chg="both" onclick="setChg('both')">%+$</button>
      </div>
    </div>
  </div>

  <div class="widget-cols" id="widget-cols">
    <div class="widget-col" id="wc1"></div>
    <div class="widget-col" id="wc2"></div>
  </div>
</div>

<script>
  // ── Config defaults (all w_* keys — shared with main app Widget tab) ─────────
  const DEFAULTS = {
    ccy:          "USD",
    chg:          "pct",
    cols:         "2",
    fontSize:     "md",
    bold:         false,
    showCcy:      true,
    showHeader:   true,
    autoSort:     false,
    showRefresh:  false,
    showControls: true,
    showChg:      true,
    showIcon:     true,
    size:         "sm",
    theme:        "dark",
    bgOpacity:    "100",
    refresh:      "15",
    assets:       "",
  };

  function readCfg() {
    const c = {};
    for (const [k, def] of Object.entries(DEFAULTS)) {
      const raw = localStorage.getItem("w_" + k);
      if (raw === null) c[k] = def;
      else if (typeof def === "boolean") c[k] = raw === "1";
      else c[k] = raw;
    }
    return c;
  }

  function writeCfg(key, val) {
    localStorage.setItem("w_" + key, typeof val === "boolean" ? (val ? "1" : "0") : val);
    cfg[key] = val;
  }

  let cfg = readCfg();

  // ── Rate data ───────────────────────────────────────────────
  let rates        = { BRL: 5.70, EUR: 0.92 };
  let lastData     = [];
  let alertsByTicker = {};

  const CCY_SYM  = { USD: "$", BRL: "R$", EUR: "€" };
  function ccyRate() { return { USD: 1, BRL: rates.BRL, EUR: rates.EUR }[cfg.ccy] || 1; }

  // ── Formatting ──────────────────────────────────────────────
  const FS_MAP = { sm: "10.5px", md: "12px", lg: "14px" };

  function fmtPrice(usdP) {
    if (usdP == null) return "—";
    const p   = usdP * ccyRate();
    const sym = cfg.showCcy ? CCY_SYM[cfg.ccy] : "";
    const a   = Math.abs(p);
    if (a >= 10000) return sym + p.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
    if (a >= 1)     return sym + p.toFixed(2);
    if (a >= 0.01)  return sym + p.toFixed(4);
    return sym + p.toPrecision(3);
  }

  function _fmtPct(pct) {
    if (pct == null) return { text: "—", cls: "neu" };
    const s   = pct >= 0 ? "+" : "";
    const cls = pct > 0.005 ? "pos" : pct < -0.005 ? "neg" : "neu";
    return { text: s + pct.toFixed(2) + "%", cls };
  }

  function _fmtVal(usdP, pct) {
    if (usdP == null || pct == null) return { text: "—", cls: "neu" };
    const prev = usdP / (1 + pct / 100);
    const abs  = (usdP - prev) * ccyRate();
    const sym  = cfg.showCcy ? CCY_SYM[cfg.ccy] : "";
    const s    = abs >= 0 ? "+" : "-";
    const cls  = abs > 0.000005 ? "pos" : abs < -0.000005 ? "neg" : "neu";
    const a    = Math.abs(abs);
    let num;
    if (a >= 100)       num = a.toFixed(2);
    else if (a >= 1)    num = a.toFixed(2);
    else if (a >= 0.01) num = a.toFixed(4);
    else                num = a.toPrecision(2);
    return { text: s + sym + num, cls };
  }

  function fmtChg(usdP, pct) {
    if (!cfg.showChg) return { text: "", cls: "neu" };
    if (cfg.chg === "pct")  return _fmtPct(pct);
    if (cfg.chg === "val")  return _fmtVal(usdP, pct);
    if (cfg.chg === "both") {
      const p = _fmtPct(pct);
      const v = _fmtVal(usdP, pct);
      return { text: v.text + " (" + p.text + ")", cls: p.cls };
    }
    return _fmtPct(pct);
  }

  function trunc(sym, n) {
    return sym.length > n ? sym.slice(0, n - 3) + "..." : sym;
  }

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function cellsHtml(a, fs) {
    if (!a) return (cfg.showIcon ? `<img class="w-icon">` : "") +
      `<span class="w-ticker"></span><span class="w-price"></span><span class="w-chg"></span>`;
    const { text: chg, cls } = fmtChg(a.price, a.change24h);
    const fw  = cfg.bold ? "font-weight:700;" : "";
    const fss = `font-size:${fs};`;
    const tickerAlerts = alertsByTicker[(a.symbol || "").toUpperCase()] || [];
    const activeAlerts = tickerAlerts.filter(al => !al.triggered);
    const bellTitle = activeAlerts.map(al =>
      (al.direction === "above" ? "↑" : "↓") + " $" + Number(al.target).toLocaleString("en-US")
    ).join(" • ");
    const bell = activeAlerts.length
      ? `<span class="w-bell" title="${esc(bellTitle)}">🔔</span>` : "";
    const rawSym  = a.symbol || "";
    const symTrunc = trunc(rawSym, 12);
    const iconHtml = cfg.showIcon
      ? `<img class="w-icon" src="/static/icons/tokens/${esc(rawSym.toUpperCase())}.png" alt="" onerror="this.style.visibility='hidden';this.style.width='0'">`
      : "";
    return iconHtml +
           `<span class="w-ticker" style="${fss}${fw}">${esc(symTrunc)}${bell}</span>` +
           `<span class="w-price"  style="${fss}${fw}">${esc(fmtPrice(a.price))}</span>` +
           `<span class="w-chg ${cls}" style="${fss}${fw}">${esc(chg)}</span>`;
  }

  // ── Theme ───────────────────────────────────────────────────
  function applyTheme(theme) {
    let resolved = theme;
    if (theme === "auto") {
      resolved = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    }
    document.documentElement.setAttribute("data-theme", resolved);
  }

  // ── Render ──────────────────────────────────────────────────
  function applyLayout() {
    cfg = readCfg();

    applyTheme(cfg.theme || "dark");

    // Background opacity
    const opacity = Math.min(100, Math.max(0, parseInt(cfg.bgOpacity ?? "100", 10))) / 100;
    document.querySelector(".widget").style.backgroundColor =
      opacity === 0 ? "transparent" : `rgba(${
        document.documentElement.getAttribute("data-theme") === "light"
          ? "244,244,244"
          : "15,15,20"
      },${opacity})`;

    const fs = FS_MAP[cfg.fontSize] || "12px";
    document.getElementById("widget-cols").style.setProperty("font-size", fs);

    const wc2 = document.getElementById("wc2");
    wc2.style.display = cfg.cols === "1" ? "none" : "";

    const topbar = document.getElementById("topbar");
    topbar.style.display = (cfg.showHeader || cfg.showControls) ? "" : "none";

    document.getElementById("wh").style.display          = cfg.showHeader   ? "" : "none";
    document.getElementById("refresh-btn").style.display = cfg.showRefresh  ? "" : "none";
    document.getElementById("controls").style.display    = cfg.showControls ? "" : "none";

    // Icon column: adjust grid and visibility
    const gridCols = cfg.showIcon
      ? "max-content 1fr max-content max-content"
      : "1fr max-content max-content";
    document.querySelectorAll(".widget-col").forEach(col => {
      col.style.gridTemplateColumns = gridCols;
    });

    document.querySelectorAll("#ccy-group .pill").forEach(b =>
      b.classList.toggle("active", b.dataset.ccy === cfg.ccy));
    document.querySelectorAll("#chg-group .pill").forEach(b =>
      b.classList.toggle("active", b.dataset.chg === cfg.chg));

    const vb = document.getElementById("chg-val-btn");
    if (vb) vb.textContent = "±" + (cfg.showCcy ? CCY_SYM[cfg.ccy] : "$");
  }

  function render() {
    applyLayout();
    let data = [...lastData];

    // Filter to selected assets
    const selected = cfg.assets ? cfg.assets.split(",").filter(Boolean) : [];
    if (selected.length) {
      data = data.filter(a => selected.includes((a.symbol || "").toUpperCase()));
      data.sort((a, b) =>
        selected.indexOf((a.symbol || "").toUpperCase()) -
        selected.indexOf((b.symbol || "").toUpperCase())
      );
    }

    if (cfg.autoSort) {
      data.sort((a, b) => (b.change24h || 0) - (a.change24h || 0));
    }

    const fs   = FS_MAP[cfg.fontSize] || "12px";
    const half = cfg.cols === "1" ? data.length : Math.ceil(data.length / 2);
    const col1 = data.slice(0, half);
    const col2 = cfg.cols === "1" ? [] : data.slice(half);

    document.getElementById("wc1").innerHTML = col1.map(a => cellsHtml(a, fs)).join("");
    document.getElementById("wc2").innerHTML = col2.map(a => cellsHtml(a, fs)).join("");
  }

  // ── Quick-control handlers ──────────────────────────────────
  function setCcy(v) { writeCfg("ccy", v); render(); }
  function setChg(v) { writeCfg("chg", v); render(); }

  // ── Data fetch ──────────────────────────────────────────────
  let _refreshInterval = null;

  async function load() {
    try {
      const [ra, rr, ral] = await Promise.all([fetch("/api/assets"), fetch("/api/rates"), fetch("/api/alerts")]);
      const data   = await ra.json();
      const rdata  = await rr.json();
      const alData = await ral.json().catch(() => []);
      if (rdata.BRL) rates.BRL = rdata.BRL;
      if (rdata.EUR) rates.EUR = rdata.EUR;
      lastData = data;
      alertsByTicker = {};
      for (const al of (Array.isArray(alData) ? alData : [])) {
        const k = al.ticker.toUpperCase();
        if (!alertsByTicker[k]) alertsByTicker[k] = [];
        alertsByTicker[k].push(al);
      }
      const now = new Date();
      const hh  = now.getHours().toString().padStart(2, "0");
      const mm  = now.getMinutes().toString().padStart(2, "0");
      document.getElementById("wh-text").textContent = "Last fetch: " + hh + ":" + mm;
      render();
    } catch(e) {
      document.getElementById("wh-text").textContent = "Erro ao carregar";
    }
  }

  function scheduleRefresh() {
    if (_refreshInterval) clearInterval(_refreshInterval);
    const mins = parseInt(cfg.refresh, 10) || 15;
    _refreshInterval = setInterval(load, mins * 60 * 1000);
  }

  // ── React to config changes made in the main app (same origin, other tab/page)
  window.addEventListener("storage", (e) => {
    if (e.key && e.key.startsWith("w_")) {
      render();
      scheduleRefresh();
    }
  });

  // ── Init ────────────────────────────────────────────────────
  applyLayout();
  load();
  scheduleRefresh();
</script>
</body>
</html>
